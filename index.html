的收获\n为什么做测试\n自学能力、有耐心和细心、抗压能力强，有责任感。\n了解开发流程吗\n测试优惠券\n工作地点能接受吗\n职业计划\n反问"}, {"category": "常见问题", "title": "海康威视", "answer": "自我介绍\n用过python哪些库\n有没有实习\n你了解软件测试吗\n测试的工作内容\n测试需要什么\n你有什么优势\n你有什么劣势\n老家在哪里，父母干什么的\n为什么选择测试\n黑盒测试居多，你怎么看待这样的工作\n反问\n能不能接受"}, {"category": "常见问题", "title": "深信服", "answer": "代码题：闰平年\n双膜理论\n项目内容\n比赛——为什么你们能获奖\n兴趣爱好\n操作系统和组成原理\n操作系统是什么\n了解病毒吗"}, {"category": "常见问题", "title": "帆软", "answer": "自我介绍\n是否熟悉java语法\n数据类型\n列表和元组的区别\n列表和元组的操作方法\n字典删除值\npython闭包\npython 文件是怎么传值的\nGIL锁\nflask前后端数据交互的方式\n接口参数如何传给前端\n收藏表如果一个用户收藏，另一个用户取消收藏，页面如何显示\n评论显示有顺序吗\n项目怎么操作数据库\n项目返回值是什么格式\n表查询语句\n表更新语句\n表增加字段\njmeter脚本编写\nlinux相关命令\n查询CPU型号\n查询CPU使用情况\nfree命令哪些参数\n接口测试怎么做的\npostman请求体数据\npostman响应数据\n怎么测试你项目中的登录接口（用了哪些测试用例设计方法）\nselenium怎么定位元素，以class为例，介绍\n为什么转行做测试\n组织过什么活动\n你理解的测试开发是怎样的，工作中只有30%是代码编写，你怎么看\n你的职业规划\n反问"}, {"category": "常见问题", "title": "OPPO", "answer": "中规中矩"}, {"category": "常见问题", "title": "兴业数金", "answer": "xpath中/和//的区别"}, {"category": "常见问题", "title": "思谋科技", "answer": "手撕两道代码题<回文串，循环读取统计正负值>\n有没有用过linux，linux命令举例\n列表和元组区别\n迭代器和生成器的区别\n装饰器\n进程和线程的区别\nmysql设计了多少张表\n前端自己写的吗\ngroup by和order by区别\n有没有生成测试报告，如何生成\npytest和unitest区别\npytest是基于unittest实现的测试框架，它可以兼容unittest，而unittest不能兼容pytest，pytest的用法更加简洁，参数化、断言等\n![img](https://img2018.cnblogs.com/blog/1523120/201910/1523120-20191008141110192-1037612740.png)\n左连接和右连接\n三次握手\ntoken"}, {"category": "常见问题", "title": "思谋二面", "answer": "详细介绍下你的项目，包括开发和测试相关，功能实现\n怎么从前端定位bug到后端的\n有没有遇到什么问题，是怎么解决的\n了解搜索有哪些方法实现\n学习了哪些课程，有没有遇到一些困惑的点，举例说明\nTCP 和UDP的区别\n项目过程中使用了哪些协议\n这些协议属于哪一层\n用了哪些测试工具\n计算机网络为什么要分层"}, {"category": "常见问题", "title": "虾皮——测试工程师", "answer": "面试55分钟\n针对朋友圈点赞设计测试用例\n内存泄露\n敏捷测试的作用\n各种测试工具的特点和用法\nlinux命令介绍\n针对面试房间这个界面设计测试用例\n写SQL语句\n两数之和，输出所有不重复结果\n怎么看待自动化测试\n怎么一步步定位bug到代码\n单元测试、集成测试、系统测试、验收测试的特点和区别"}, {"category": "常见问题", "title": "虾皮二面", "answer": "内存泄漏\n内存管理机制\n设计测试用例\n最大子数组和\n多线程\n索引为什么快\n为什么不能把所有列增加索引\n装饰器\n进程通信方式\nTCP、UDP区别\n同步和异步"}, {"category": "常见问题", "title": "网易", "answer": "网易有道成人部\t面试65分钟\t采用敏捷开发，UI自动化测试看时间，可能不做，没有测试平台\n你的接口自动化测试框架是怎么确定的，封装了哪些模块\npytest执行的时候设置哪些参数\n除了pytest还了解哪些测试框架\nfixture用法\nUI自动化测试有哪些问题，如何解决的\nUI自动化测试中封装了哪些方法\n显式等待和隐式等待（隐式等待是在服务端）\n八股文\nrequests源码了解吗\n接口自动化中有没有封装requests的请求方法\n你的PO设计模式是怎么设计的\nfiddler有哪些功能\n接口之间的关联是怎么做的\n怎么学习测试相关知识，学习过程中怎么落实计划的"}, {"category": "常见问题", "title": "网易二面", "answer": "es搜索功能实现\nes搜索中各种细节（完全不会）比如动态映射和静态映射\n搜索功能和搜索效率做了哪些测试\n测试纸杯\n回文串判断\n手机淘宝点击没反应，可能是哪些问题导致的，如何排查\n性能测试工具，jmeter线程组概念，Jmeter的断言类型"}, {"category": "常见问题", "title": "ZEKU", "answer": "C的编译过程\n动态规划\nfiddler Mock"}, {"category": "常见问题", "title": "阿里二面电话面", "answer": "用过哪些中间件\n书籍上学到的测试知识和实际工作中有什么不一样\n要不要看研发代码，有没有发现过什么问题\n印象比较深的bug\n开发的自动化框架和公司内部其他人开发的有没有做过对比\n1. ES有哪些风险\n2.Redis—击穿、穿透、雪崩分别介绍一下，有什么不同\n2. 我们服务的整个链路，每个服务做什么\n3. rpc接口有什么优点和http有什么不同\n4. http协议由哪几部分\n5. 线上性能问题怎么定位的\n6. redis有几种数据结构\n7. 我们的上游服务是怎么调用下游服务的，如何做到服务发现的\n9.你们服务中使用过哪些中间件，分别介绍一下\n8. 我们线上压测的话会有数据读写吧？怎么做到避免数据污染\n**1、缓存穿透**\n缓存穿透是指缓存和数据库中没有数据，导致所有请求都落到数据库上，造成数据库短时间承受大量请求而崩溃\n出现场景：\n被别人恶意攻击（比如，发起ID=-1的请求）\n解决方案：\n接口层增加入参校验，如用户鉴权校验，id做基础校验，id<=0的直接拦截\n从缓存取不到的数据库，在数据库中也没取到，这个时候可以将key-velue写成key-null,缓存有效时间可以设置短点（设置太长会导致正常情况也无法使用），这样可以防止用户反复用同一个id暴力共计\n采用布隆过滤器，将所有可能存在的数据haxi到一个足够大的bitmap中，一个一定不存在的数据会被bitmap拦截掉，从而避免对底层存储系统查询增加压力。\n布隆过滤器算法的特点：①不在布隆过滤器中的元素，一定不存在。②在不拢国企中的元素，大概率存在（但是不是一定存在）\n**2、缓存击穿**\n缓存穿透是指缓存中没有数据但是数据库中有数据（一般是缓存时间到期），这个时候由于 并发用户特别多，同时读缓存没有的数据，然后去数据库中拉取数据，引起数据库压力瞬间增大，造成崩溃，和缓存雪崩不同的是，缓存击穿是指并发查询同一个数据，缓存雪崩是指大量缓存数据过期。\n出现场景：\n刚好缓存过期期间，有大量的请求访问该过期数据\n解决方案：\n设置热点数据永远不过期\n加互斥锁（重新将数据缓存到redis的时候加一把锁）\n**3、缓存雪崩**\n缓存雪崩是指缓存同一时间大面积失效，所以后面的请求都会落到数据库上，造成数据库短时间承受大量请求崩溃\n出现场景：\n缓存宕机，缓存数据大面积同时实习爱哦\n缓存同时到期，缓存数据大面积同时失效\n解决方案：\n避免出现缓存雪崩\n1.一般采用“搭建高可用集群”，防止Redis服务器宕机导致缓存雪崩\n2.采用设置不同的过期时间，防止同一时间大量数据过期现象发生\n3.给每个缓存数据增加相应的缓存标记，记录缓存是否失效，如果缓存标记失效，则更新数据缓存\n4.设置热点数据永远不过期\n5.互斥锁\n已经出现缓存雪崩\n假设已经出现缓存雪崩，那么，没有其他发解决办法！只能进行熔断、降级、限流\n1.熔断，（拒绝请求）一旦发现当前服务的请求失败率达到预设的值，就拒绝随后该服务的所有请求。\n2.限流，（限制请求数量）当经过一段时间后，后放行该服务的一部分请求，两次统计他的请求失败率，如果此时请求失败率符合预设值，则完全打开限流开关；如果请求失败率仍然很高，那么继续拒绝该服务的所有请求，这就是所谓的限流。\n3.降级，（服务降级）而向哪些被拒绝的请求直接返回一个预设结果，被称为降级。\n**rpc和http的区别是什么**\n**HTTP协议由哪些部分组成？**\n**HTTP请求的组成**\n​     **状态行、请求头、消息主体三部分组成。**\n**HTTP 响应的组成**\n​     **状态行、响应头、响应正文**"}];

        let questions = [];
        let filteredQuestions = [];
        let currentSpeakingIndex = -1;
        let isSpeaking = false;

        const questionList = document.getElementById('questionList');
        const categoryNav = document.querySelector('.category-nav');
        const randomBtn = document.getElementById('randomBtn');
        const closeAnswer = document.getElementById('closeAnswer');

        // 加载题目数据
        function loadQuestions() {
            questions = questionsData;
            filteredQuestions = questions;
            renderCategories();
            renderQuestions(questions);
            console.log('加载成功，共', questions.length, '道题目');
        }

        // 渲染分类导航
        function renderCategories() {
            const categories = [...new Set(questions.map(q => q.category))];

            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = 'cat-btn';
                btn.dataset.category = cat;
                btn.textContent = cat;
                btn.addEventListener('click', () => filterByCategory(cat));
                categoryNav.appendChild(btn);
            });

            categoryNav.querySelector('[data-category="all"]').addEventListener('click', () => filterByCategory('all'));
        }

        // 按分类筛选
        function filterByCategory(category) {
            document.querySelectorAll('.cat-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.category === category);
            });

            if (category === 'all') {
                filteredQuestions = questions;
            } else {
                filteredQuestions = questions.filter(q => q.category === category);
            }

            renderQuestions(filteredQuestions);
            closeAnswer.classList.remove('show');
        }

        // 渲染题目列表
        function renderQuestions(list) {
            if (list.length === 0) {
                questionList.innerHTML = '<div class="empty-state">暂无题目</div>';
                return;
            }

            questionList.innerHTML = list.map((q, index) => `
                <div class="question-item" data-index="${index}">
                    <div class="question-category">${q.category}</div>
                    <div class="question-title">${q.title}</div>
                    <div class="answer" ><div class="answer-content">${formatAnswer(q.answer)}</div>
                        
                    </div>
                </div>
            `).join('');

            // 添加点击事件
            document.querySelectorAll('.question-item').forEach(item => {
                item.addEventListener('click', (e) => {
                    if (e.target.closest('.speak-btn-disabled')) return;
                    const index = parseInt(item.dataset.index);
                    toggleAnswer(index);
                });
            });

            // 已禁用按钮事件
            document.querySelectorAll('.speak-btn-disabled').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const index = parseInt(btn.dataset.index);
                    speakQuestion(index);
                });
            });
        }

        // 格式化答案
        function formatAnswer(answer) {
            if (!answer) return '暂无答案';
            return answer
                .replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/\n/g, '<br>');
        }

        // 切换答案显示
        function toggleAnswer(index) {
            const items = document.querySelectorAll('.question-item');
            const clickedItem = items[index];

            items.forEach((item, i) => {
                if (i !== index) {
                    item.classList.remove('expanded');
                }
            });

            clickedItem.classList.toggle('expanded');

            const hasExpanded = document.querySelector('.question-item.expanded');
            closeAnswer.classList.toggle('show', !!hasExpanded);
        }

        // 收起答案
        closeAnswer.addEventListener('click', () => {
            document.querySelectorAll('.question-item').forEach(item => {
                item.classList.remove('expanded');
            });
            closeAnswer.classList.remove('show');
        });

        // 语音已禁用
        function _speakQuestion_disabled(index) {
            const question = filteredQuestions[index];
            if (!question) return;

            let answerText = question.answer || '';
            answerText = answerText.replace(/```[\s\S]*?```/g, '');
            answerText = answerText.replace(/`/g, '');
            answerText = answerText.replace(/#+\s*/g, '');
            answerText = answerText.replace(/\*/g, '');
            answerText = answerText.replace(/\[.*?\]\(.*?\)/g, '');
            answerText = answerText.replace(/\n+/g, ' ');
            answerText = answerText.trim();

            if (answerText.length > 500) {
                answerText = answerText.substring(0, 500) + '...';
            }

            const text = `${question.category}。${question.title}。答案是：${answerText}`;

            if (isSpeaking) {
                speechSynthesis.cancel();
                updateSpeakButton(index, false);
                isSpeaking = false;
                return;
            }

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 1;
            utterance.lang = 'zh-CN';

            utterance.onstart = () => {
                isSpeaking = true;
                currentSpeakingIndex = index;
                updateSpeakButton(index, true);
            };

            utterance.onend = () => {
                isSpeaking = false;
                currentSpeakingIndex = -1;
                updateSpeakButton(index, false);
            };

            utterance.onerror = (err) => {
                isSpeaking = false;
                currentSpeakingIndex = -1;
                updateSpeakButton(index, false);
            };

            speechSynthesis.speak(utterance);
        }

        // 更新已禁用按钮状态
        function updateSpeakButton(index, speaking) {
            const btn = document.querySelector(`.speak-btn-disabled[data-index="${index}"]`);
            if (!btn) return;

            const icon = btn.querySelector('.speak-icon');
            const text = btn.querySelector('.speak-text');

            if (speaking) {
                btn.classList.add('speaking');
                icon.textContent = '⏹';
                text.textContent = '停止';
            } else {
                btn.classList.remove('speaking');
                icon.textContent = '🔊';
                text.textContent = '已禁用';
            }
        }

        // 随机一题
        function randomQuestion() {
            if (filteredQuestions.length === 0) return;
            const randomIndex = Math.floor(Math.random() * filteredQuestions.length);

            document.querySelectorAll('.question-item').forEach(item => {
                item.classList.remove('expanded');
            });

            setTimeout(() => {
                const items = document.querySelectorAll('.question-item');
                if (items[randomIndex]) {
                    items[randomIndex].scrollIntoView({ behavior: 'smooth', block: 'center' });
                    setTimeout(() => {
                        items[randomIndex].classList.add('expanded');
                        closeAnswer.classList.add('show');
                    }, 300);
                }
            }, 100);
        }

        // 事件绑定
        randomBtn.addEventListener('click', randomQuestion);

        // 初始化
        loadQuestions();
    </script>
</body>
</html>
